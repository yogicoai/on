<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>요기보 발주 예측</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { font-family: 'Pretendard', sans-serif; }
    thead th { position: sticky; top: 0; z-index: 10; background-color: #f1f5f9; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-track { background-color: #f1f5f9; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen p-2 md:p-6">
  <div class="max-w-7xl mx-auto flex flex-col h-[96vh]">
    <header class="flex flex-col mb-3 gap-2 flex-shrink-0">
      <div class="flex flex-col xl:flex-row justify-between items-start xl:items-end gap-3">
        <div>
          <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
            📦 발주 예측
            <a href="/" class="text-xs font-normal text-blue-600 hover:underline">← 판매 분석 대시보드</a>
          </h1>
          <p id="subline" class="text-slate-500 text-xs md:text-sm mt-1">데이터 로딩 중…</p>
        </div>
        <div class="flex flex-wrap gap-2 items-center">
          <div class="flex bg-white p-1 rounded-lg border border-slate-300 shadow-sm gap-1">
            <button id="mode-reorder" onclick="setMode('reorder')" class="mode-btn px-3 py-1.5 text-sm font-bold rounded-md bg-slate-800 text-white">발주 판단</button>
            <button id="mode-sales" onclick="setMode('sales')" class="mode-btn px-3 py-1.5 text-sm font-bold rounded-md text-slate-600 hover:bg-slate-100">판매 예측</button>
          </div>
          <label class="text-xs text-slate-600 bg-white border border-slate-300 rounded-md px-2 py-1.5 shadow-sm">기준
            <select id="months" onchange="reload()" class="ml-1 text-sm font-bold outline-none">
              <option value="3">최근 3개월</option><option value="6">최근 6개월</option><option value="12">최근 12개월</option>
            </select>
          </label>
          <label id="targetWrap" class="text-xs text-slate-600 bg-white border border-slate-300 rounded-md px-2 py-1.5 shadow-sm">발주선
            <select id="target" onchange="reload()" class="ml-1 text-sm font-bold outline-none">
              <option value="0.5">0.5개월치</option><option value="1" selected>1개월치</option><option value="2">2개월치</option>
            </select>
          </label>
        </div>
      </div>

      <div class="flex flex-col md:flex-row gap-2 items-stretch md:items-center">
        <div id="cat-tabs" class="flex bg-white p-1 rounded-lg border border-slate-300 shadow-sm gap-1 overflow-x-auto scrollbar-hide whitespace-nowrap">
          <button onclick="setCat('전체',this)" class="cat-btn px-3 py-1.5 text-sm font-bold rounded-md bg-blue-600 text-white">전체</button>
          <button onclick="setCat('커버',this)" class="cat-btn px-3 py-1.5 text-sm font-bold rounded-md text-slate-600 hover:bg-slate-100">커버</button>
          <button onclick="setCat('이너',this)" class="cat-btn px-3 py-1.5 text-sm font-bold rounded-md text-slate-600 hover:bg-slate-100">이너</button>
          <button onclick="setCat('인형',this)" class="cat-btn px-3 py-1.5 text-sm font-bold rounded-md text-slate-600 hover:bg-slate-100">인형</button>
          <button onclick="setCat('리빙',this)" class="cat-btn px-3 py-1.5 text-sm font-bold rounded-md text-slate-600 hover:bg-slate-100">리빙</button>
        </div>
        <label id="needWrap" class="flex items-center gap-1.5 text-sm font-bold text-red-600 bg-white border border-slate-300 rounded-lg px-3 py-2 shadow-sm cursor-pointer">
          <input type="checkbox" id="needOnly" onchange="render()" class="accent-red-600" /> 🚨 발주 필요만
        </label>
        <div class="relative flex-grow">
          <input type="text" id="search" onkeyup="render()" placeholder="상품명·색상·품목코드 검색…"
            class="w-full pl-3 pr-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 shadow-sm bg-white" />
        </div>
      </div>
    </header>

    <div class="bg-white border border-slate-300 rounded-lg shadow-sm flex-grow overflow-hidden flex flex-col relative">
      <div class="overflow-auto flex-grow">
        <table class="w-full text-sm text-left whitespace-nowrap">
          <thead id="thead" class="bg-slate-100 text-slate-600 border-b border-slate-300 font-bold uppercase tracking-wider text-xs"></thead>
          <tbody id="rows" class="divide-y divide-slate-200"></tbody>
        </table>
      </div>
      <div id="empty" class="hidden absolute inset-0 flex items-center justify-center text-slate-400 bg-white/80 z-20"><p class="text-lg font-medium">데이터가 없습니다.</p></div>
      <div id="spinner" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-white/80 z-30 backdrop-blur-sm">
        <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-3"></div>
        <p class="text-slate-600 font-medium animate-pulse">집계 중…</p>
      </div>
    </div>

    <details id="unmatchedBox" class="mt-2 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 text-xs text-amber-800 hidden">
      <summary class="cursor-pointer font-bold">⚠️ 판매는 있는데 재고와 이름이 안 맞아 매칭 못한 SKU <span id="unmatchedCount"></span> — 이름 표기만 맞추면 발주판단에 잡힙니다</summary>
      <div id="unmatchedList" class="mt-2 grid grid-cols-2 md:grid-cols-3 gap-x-4 gap-y-1"></div>
    </details>
  </div>

  <script>
    const COLOR_MAP = {"체리 레드":"#D80C1E","와인 버건디":"#A22327","스위트 오렌지":"#EE780C","로즈핑크":"#E61A67","올리브 그린":"#79A02F","아쿠아 블루":"#0081CC","네이비 블루":"#10376C","브라이트 퍼플":"#754095","딥 퍼플":"#87234B","초코 브라운":"#745334","라이트 그레이":"#E5DED3","다크 그레이":"#615F5F","리빙 코랄":"#FF6633","블라썸 핑크":"#FFD3C5","브라이트 옐로우":"#FFE100","라벤더 퍼플":"#E6C8CE","프레시 민트":"#CCEFC2","파스텔 블루":"#D6E0EC","아보카도 그린":"#C6D59B","로즈 핑크":"#E61A67","스카이":"skyblue","시트러스":"orange","오닉스":"#3A5657","그라스":"#BED12B","스톤":"#98ABB6","딥 블랙":"#000","스노우":"#fff","블랙펄":"#333","리빙 코럴":"orange","오션":"blue","슈가 브라운":"#6b3636"};
    const won = (n) => (n||0).toLocaleString('ko-KR');
    const enc = encodeURIComponent;

    let MODE = 'reorder';     // 'reorder' | 'sales'
    let CAT = '전체';
    let DATA = null;          // 마지막 응답
    let SORT = { col: 'monthsLeft', asc: true }; // 발주판단 기본: 소진 임박순

    function setMode(m) {
      MODE = m;
      document.getElementById('mode-reorder').className = 'mode-btn px-3 py-1.5 text-sm font-bold rounded-md ' + (m==='reorder'?'bg-slate-800 text-white':'text-slate-600 hover:bg-slate-100');
      document.getElementById('mode-sales').className = 'mode-btn px-3 py-1.5 text-sm font-bold rounded-md ' + (m==='sales'?'bg-slate-800 text-white':'text-slate-600 hover:bg-slate-100');
      // 판매예측 모드: 재고 무관 → 카테고리/발주선/발주필요 숨김
      document.getElementById('cat-tabs').style.display = m==='sales' ? 'none' : '';
      document.getElementById('needWrap').style.display = m==='sales' ? 'none' : '';
      document.getElementById('targetWrap').style.display = m==='sales' ? 'none' : '';
      document.getElementById('unmatchedBox').classList.add('hidden');
      SORT = m==='reorder' ? { col:'monthsLeft', asc:true } : { col:'monthlyAvg', asc:false };
      reload();
    }
    function setCat(c, btn) {
      CAT = c;
      document.querySelectorAll('.cat-btn').forEach(b => b.className = 'cat-btn px-3 py-1.5 text-sm font-bold rounded-md text-slate-600 hover:bg-slate-100');
      btn.className = 'cat-btn px-3 py-1.5 text-sm font-bold rounded-md bg-blue-600 text-white';
      render();
    }
    function toggleSort(col) {
      if (SORT.col === col) SORT.asc = !SORT.asc; else SORT = { col, asc: col==='name' };
      render();
    }

    async function reload() {
      const sp = document.getElementById('spinner'); sp.classList.remove('hidden');
      try {
        const months = document.getElementById('months').value;
        if (MODE === 'reorder') {
          const target = document.getElementById('target').value;
          const r = await fetch(`/api/forecast/reorder?months=${months}&target=${target}`).then(r=>r.json());
          if (!r.ok) throw new Error(r.error);
          DATA = r;
          document.getElementById('subline').innerHTML =
            `이카운트 전체 몰 · 최근 <b>${r.monthsCount}개월</b> 평균(${r.months.join(' · ')}) · 재고 ${r.count}종 중 판매매칭 <b>${r.matchedCount}</b>종 · 🚨발주필요 <b class="text-red-600">${r.needOrderCount}</b>종 · 발주선 ${r.targetMonths}개월치` +
            (r.updatedAt ? ` · 재고 ${new Date(r.updatedAt).toLocaleString('ko-KR')}` : '') +
            (r.stockError ? ' · <span class="text-red-600">재고 API 연결 실패</span>' : '');
          renderUnmatched(r.unmatchedSellers);
        } else {
          const r = await fetch(`/api/forecast/sales?months=${months}`).then(r=>r.json());
          if (!r.ok) throw new Error(r.error);
          DATA = r;
          document.getElementById('subline').innerHTML = `이카운트 전체 몰 · 최근 <b>${r.monthsCount}개월</b> 평균(${r.months.join(' · ')}) · 판매 SKU <b>${r.count}</b>종`;
          document.getElementById('unmatchedBox').classList.add('hidden');
        }
        render();
      } catch (e) {
        document.getElementById('rows').innerHTML = `<tr><td colspan="9" class="text-center py-16 text-red-500 font-bold">오류: ${e.message}</td></tr>`;
      } finally { sp.classList.add('hidden'); }
    }

    function colorChip(c) {
      const hex = COLOR_MAP[(c||'').trim()];
      return hex ? `<span class="w-3 h-3 rounded-full inline-block border border-slate-200 flex-shrink-0" style="background:${hex}"></span>` : '';
    }
    function catBadge(cat) {
      let cls = 'bg-slate-200 text-slate-600';
      if (cat==='커버') cls='bg-blue-100 text-blue-700'; else if (cat==='이너') cls='bg-yellow-100 text-yellow-700';
      else if (cat==='인형') cls='bg-pink-100 text-pink-700'; else if (cat==='리빙') cls='bg-green-100 text-green-700';
      else if (cat==='본품') cls='bg-indigo-100 text-indigo-700'; else if (cat==='충전재') cls='bg-teal-100 text-teal-700';
      return `<span class="text-[11px] px-2 py-0.5 rounded-full font-bold ${cls}">${cat||'-'}</span>`;
    }
    const sortIcon = (col) => SORT.col===col ? (SORT.asc?' ▲':' ▼') : '';

    function render() {
      if (!DATA) return;
      const q = document.getElementById('search').value.toLowerCase().trim();
      const kws = q.split(' ').filter(Boolean);
      const needOnly = MODE==='reorder' && document.getElementById('needOnly').checked;
      let rows = (DATA.items || []).slice();
      if (MODE==='reorder' && CAT!=='전체') rows = rows.filter(r => r.category === CAT);
      if (needOnly) rows = rows.filter(r => r.needOrder);
      if (kws.length) rows = rows.filter(r => { const t = ((r.code||'')+' '+r.name+' '+r.color).toLowerCase(); return kws.every(k => t.includes(k)); });

      rows.sort((a,b) => {
        // 발주판단: 발주필요 먼저, 그 다음 정렬키 / 매칭없는(monthsLeft null)은 뒤로
        if (MODE==='reorder') { if (a.needOrder!==b.needOrder) return a.needOrder?-1:1; }
        let va = a[SORT.col], vb = b[SORT.col];
        const na = (va===null||va===undefined), nb = (vb===null||vb===undefined);
        if (na && nb) return 0; if (na) return 1; if (nb) return -1;
        if (typeof va === 'string') { va=va.toLowerCase(); vb=vb.toLowerCase(); return SORT.asc ? (va<vb?-1:va>vb?1:0) : (va>vb?-1:va<vb?1:0); }
        return SORT.asc ? va-vb : vb-va;
      });

      const thead = document.getElementById('thead');
      const tbody = document.getElementById('rows');
      const empty = document.getElementById('empty');
      empty.classList.toggle('hidden', rows.length>0);

      if (MODE==='reorder') {
        thead.innerHTML = `<tr>
          <th class="px-3 py-3 w-16 text-center">분류</th>
          <th class="px-3 py-3 w-24 text-center">품목코드</th>
          <th onclick="toggleSort('name')" class="px-3 py-3 cursor-pointer hover:bg-slate-200">상품명${sortIcon('name')}</th>
          <th class="px-3 py-3">색상</th>
          <th onclick="toggleSort('monthlyAvg')" class="px-3 py-3 w-28 text-right cursor-pointer hover:bg-slate-200">월평균 판매${sortIcon('monthlyAvg')}</th>
          <th onclick="toggleSort('stock')" class="px-3 py-3 w-24 text-right cursor-pointer hover:bg-slate-200">현재고${sortIcon('stock')}</th>
          <th onclick="toggleSort('monthsLeft')" class="px-3 py-3 w-28 text-right cursor-pointer hover:bg-slate-200">소진예상${sortIcon('monthsLeft')}</th>
          <th class="px-3 py-3 w-28 text-right">발주 제안</th></tr>`;
        tbody.innerHTML = rows.map((r,i) => {
          const bg = i%2 ? 'bg-slate-50' : 'bg-white';
          const ml = r.monthsLeft;
          let mlCell, mlClass='text-slate-600';
          if (!r.matched) mlCell = '<span class="text-slate-300">판매없음</span>';
          else if (ml===null) mlCell = '∞';
          else { if (ml<1) mlClass='text-red-600 font-extrabold'; else if (ml<2) mlClass='text-orange-500 font-bold'; mlCell = `${ml}개월`; }
          const order = r.needOrder ? `<span class="text-[11px] bg-red-100 text-red-700 px-2 py-0.5 rounded-full font-extrabold border border-red-200">발주 +${won(r.suggestQty)}</span>` : (r.matched?'<span class="text-slate-300 text-xs">충분</span>':'<span class="text-slate-300 text-xs">-</span>');
          return `<tr class="${bg} hover:bg-blue-50">
            <td class="px-3 py-2.5 text-center">${catBadge(r.category)}</td>
            <td class="px-3 py-2.5 text-center text-xs text-slate-500 font-mono">${r.code||'-'}</td>
            <td class="px-3 py-2.5 font-semibold text-slate-700">${r.name}</td>
            <td class="px-3 py-2.5 text-slate-600"><div class="flex items-center gap-2">${colorChip(r.color)}<span>${r.color||'-'}</span></div></td>
            <td class="px-3 py-2.5 text-right font-mono ${r.monthlyAvg>0?'text-slate-800 font-bold':'text-slate-300'}">${r.matched?r.monthlyAvg:'-'}</td>
            <td class="px-3 py-2.5 text-right font-mono ${r.stock<=0?'text-red-500 font-bold':'text-slate-800'}">${won(r.stock)}</td>
            <td class="px-3 py-2.5 text-right font-mono ${mlClass}">${mlCell}</td>
            <td class="px-3 py-2.5 text-right">${order}</td></tr>`;
        }).join('');
      } else {
        thead.innerHTML = `<tr>
          <th class="px-3 py-3 w-16 text-center">성격</th>
          <th onclick="toggleSort('name')" class="px-3 py-3 cursor-pointer hover:bg-slate-200">상품명${sortIcon('name')}</th>
          <th class="px-3 py-3">색상</th>
          <th class="px-3 py-3 text-right">최근 추이</th>
          <th onclick="toggleSort('total')" class="px-3 py-3 w-28 text-right cursor-pointer hover:bg-slate-200">기간 합계${sortIcon('total')}</th>
          <th onclick="toggleSort('monthlyAvg')" class="px-3 py-3 w-36 text-right cursor-pointer hover:bg-slate-200">월평균 = 1개월 예상${sortIcon('monthlyAvg')}</th></tr>`;
        tbody.innerHTML = rows.map((r,i) => {
          const bg = i%2 ? 'bg-slate-50' : 'bg-white';
          return `<tr class="${bg} hover:bg-blue-50">
            <td class="px-3 py-2.5 text-center">${catBadge(r.type)}</td>
            <td class="px-3 py-2.5 font-semibold text-slate-700">${r.name}</td>
            <td class="px-3 py-2.5 text-slate-600"><div class="flex items-center gap-2">${colorChip(r.color)}<span>${r.color||'-'}</span></div></td>
            <td class="px-3 py-2.5 text-right text-xs text-slate-400 font-mono">[${(r.series||[]).join(', ')}]</td>
            <td class="px-3 py-2.5 text-right font-mono text-slate-600">${won(r.total)}</td>
            <td class="px-3 py-2.5 text-right font-mono text-base text-slate-900 font-extrabold">${r.monthlyAvg}<span class="text-xs text-slate-400 font-normal"> 개/월</span></td></tr>`;
        }).join('');
      }
    }

    function renderUnmatched(list) {
      const box = document.getElementById('unmatchedBox');
      if (!list || !list.length) { box.classList.add('hidden'); return; }
      box.classList.remove('hidden');
      document.getElementById('unmatchedCount').innerText = `(${list.length}종)`;
      document.getElementById('unmatchedList').innerHTML = list.slice(0,60).map(u =>
        `<div>· ${u.name} <span class="text-amber-600">${u.color||''}</span> <b>${u.monthlyAvg}/월</b></div>`).join('');
    }

    setMode('reorder');
  </script>
</body>
</html>
